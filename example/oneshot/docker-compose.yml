services:
  # ===========================================================================
  # EXEMPLE ONE-SHOT : Générateur de mot de passe
  # Lancez avec : docker-compose up
  # Le résultat apparaît dans le dossier ./resultats sur votre machine.
  #
  # ❓ Doc complète docker-compose → docs/docker-compose.md
  # ===========================================================================

  # ❓ docs/docker-compose.md#3-services--la-racine-de-tout
  password_generator:

    # ❓ docs/docker-compose.md#4-container_name--nommer-le-conteneur
    container_name: generateur_mdp_demo

    # L'image est construite depuis le Dockerfile dans le dossier courant.
    # ❓ docs/docker-compose.md#6-build--construire-depuis-un-dockerfile
    build: .

    # Le dossier ./resultats sur votre PC est lié à /output dans le conteneur.
    # Le fichier généré par le script sera donc accessible dans ./resultats.
    # ❓ docs/docker-compose.md#8-volumes--persister-les-données
    volumes:
      - ./resultats:/output

    # Ces variables sont lues par le script (voir script.sh).
    # Modifiez-les pour changer la longueur ou le nom du fichier de sortie.
    # ❓ docs/docker-compose.md#9-environment--variables-de-configuration
    environment:
      - LONGUEUR_MDP=16
      - FICHIER_RESULTAT=mon_nouveau_mdp.txt